version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: webhookdrop-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: webhookdrop
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: webhookdrop-redis
    ports:
      - "6381:6379"

volumes:
  postgres_data:
